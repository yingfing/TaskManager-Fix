# 工作流名称
name: Build Mod

# 触发条件：当有推送或拉取请求到 main 或 master 分支时执行
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

# 工作流程中的任务（Jobs）
jobs:
  build:
    # 运行环境：使用最新版的 Ubuntu[reference:3]
    runs-on: ubuntu-latest

    # 步骤（Steps）
    steps:
      # 1. 检出代码[reference:4]
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: true

      # 2. 设置 Java 环境[reference:5]
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'microsoft'   # 使用 Microsoft 的 JDK[reference:6]
          java-version: '21'          # 设置 Java 版本为 21[reference:7]

      # 3. 使 Gradle 包装器可执行[reference:8]
      - name: Make Gradle Wrapper Executable
        run: chmod +x ./gradlew

      # 4. 执行编译[reference:9][reference:10]
      - name: Build with Gradle
        run: ./gradlew clean build

      # 5. 上传编译产物（JAR 文件）[reference:11]
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Artifacts
          path: build/libs/
